name: Self Scan

on:
  push:
    branches: [main]

jobs:
  scan:
    name: Self Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run dep-radar scan
        run: node dist/cli.js scan --ci --format json --output report.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: dep-radar-report
          path: report.json
